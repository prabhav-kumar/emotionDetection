<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4158D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C850C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCC70;stop-opacity:1" />
    </linearGradient>
    <animate attributeName="opacity" dur="3s" values="0.7;0.9;0.7" repeatCount="indefinite" />
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)">
    <animate attributeName="opacity" dur="4s" values="0.8;1;0.8" repeatCount="indefinite" />
  </rect>
  <circle cx="960" cy="540" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <animate attributeName="r" dur="4s" values="200;300;200" repeatCount="indefinite" />
  </circle>
  <circle cx="960" cy="540" r="100" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <animate attributeName="r" dur="3s" values="100;200;100" repeatCount="indefinite" />
  </circle>
</svg>